# Dependabot (beta gap: "no Dependabot for Cargo/npm; actions float on tags").
#
# Watches every dependency surface and opens update PRs. The github-actions
# ecosystem is the supported path to keep `uses:` references current and to
# migrate them to commit-SHA pins (enable `Settings > Code security > pin
# actions to SHAs`, then Dependabot maintains the SHAs).
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/deploy/docker"
    schedule:
      interval: "weekly"
