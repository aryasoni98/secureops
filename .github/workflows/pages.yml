# GitHub Pages: landing page (site/ — Vite + React + Framer Motion) at /,
# mkdocs-material docs at /docs/.
name: Pages

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel a production deploy mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build landing page
        working-directory: site
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build docs (mkdocs-material)
        run: |
          pip install mkdocs-material
          mkdocs build --strict --site-dir _docs_build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/dist/* _site/
          mkdir -p _site/docs
          cp -r _docs_build/* _site/docs/
          # Bypass Jekyll processing on Pages.
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
