name: Release

on:
  push:
    tags:
      # Strict semver (with optional pre-release, e.g. v0.1.0-beta.1) so a typo
      # tag can never cut a release.
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

# Run bundled JS actions (checkout/setup-node/gh-release) on Node 24, ahead of
# the Node 20 removal from runners (Sept 2026). Silences deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the first version block from CHANGELOG.md
          awk '/^## v/{if (found) exit; found=1} found' CHANGELOG.md \
            | head -120 > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  sbom:
    name: Attach CycloneDX SBOM to release
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate CycloneDX SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --all
          # Aggregate every crate's SBOM into one downloadable artifact named
          # for the tag, so consumers can pull the SBOM from the release page.
          mkdir -p sbom && find . -name '*.cdx.json' -exec cp {} sbom/ \;
          tar -czf "secureops-sbom-${GITHUB_REF_NAME}.cdx.tar.gz" sbom
      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v3
        with:
          files: secureops-sbom-*.cdx.tar.gz

  build-binaries:
    name: Build release binaries (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2

      - name: Install cross (for aarch64 Linux)
        if: matrix.cross
        # Pin to a released version (not git HEAD) so the cross-compile toolchain
        # is a fixed, auditable supply-chain input.
        run: cargo install cross --locked --version 0.2.5

      - name: Install cargo-auditable
        run: cargo install cargo-auditable --locked

      - name: Set SOURCE_DATE_EPOCH from the tagged commit
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Build release binaries
        run: |
          PACKAGES="-p secureops-cli -p secureops-daemon -p secureops-api -p secureops-license-server -p secureops-scanner"
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross auditable build --release $PACKAGES --target ${{ matrix.target }}
          else
            cargo auditable build --release $PACKAGES --target ${{ matrix.target }}
          fi

      - name: Package binaries
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          BIN_DIR="target/${{ matrix.target }}/release"
          ARCHIVE="secureops-${TAG}-${{ matrix.suffix }}.tar.gz"
          cp "$BIN_DIR/secureops" secureops-cli
          cp "$BIN_DIR/secureops-daemon" secureops-daemon
          cp "$BIN_DIR/secureops-api" secureops-api
          cp "$BIN_DIR/secureops-license-server" secureops-license-server
          cp "$BIN_DIR/secureops-scanner" secureops-scanner
          tar czf "$ARCHIVE" secureops-cli secureops-daemon secureops-api secureops-license-server secureops-scanner
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload checksum to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ARCHIVE }}.sha256

      - name: Upload binary to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ARCHIVE }}

  container-image:
    name: Build, sign, attest container image
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless OIDC
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/secureops:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/secureops:latest
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, sigstore)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/secureops@${{ steps.build.outputs.digest }}

      - name: Attest SBOM + SLSA provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/secureops
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
