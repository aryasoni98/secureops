name: Chaos drills

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Twice-daily run to catch regressions in degraded-mode behavior.
    - cron: "0 */12 * * *"

jobs:
  drills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run chaos drills
        run: cargo test -p secureops-chaos --release
