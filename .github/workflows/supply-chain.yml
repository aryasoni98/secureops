name: supply-chain

# PRODUCT.md Phase 9: dependency policy, advisories, SBOM, and bench compilation.
on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly advisory refresh

jobs:
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate CycloneDX SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --all
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "**/*.cdx.json"

  benches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile benchmarks (perf targets)
        run: cargo bench --no-run -p secureops-graph -p secureops-tokenbudget
