name: CI

on:
  push:
    branches: [master]
    tags: ['v*']        # tag pushes must trigger CI so the tag-gated publish-crates job runs
  pull_request:
    branches: [master]

# Run bundled JS actions (checkout/setup-node) on Node 24, ahead of the Node 20
# removal from runners (Sept 2026). Silences deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust workspace
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v6
        with:
          node-version: 22   # needed by napi-build
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all --check

  # ── Release: publish crates.io on version tag ───────────────────────────
  # The npm shim (@adversa/secureops) lives in a separate repository and is
  # released from there; this workspace publishes only the Rust crates.
  publish-crates:
    name: Publish crates.io
    needs: [rust]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2
      # Publish in dependency order (core first, cli last).
      # Idempotent + rate-limit-aware: skips crates/versions already on
      # crates.io and sleeps through 429s. crates.io throttles *new* crate
      # names to ~1 / 10 min, so a first-time 16-crate publish can take ~2h;
      # the loop simply waits it out (well within the 6h job limit). Re-runs
      # resume cleanly because already-published crates are skipped.
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in \
            secureops-core \
            secureops-intel \
            secureops-crypto \
            secureops-fs \
            secureops-checks \
            secureops-harden \
            secureops-monitors \
            secureops-auditlog \
            secureops-ipc \
            secureops-policy \
            secureops-proxy \
            secureops-bpf \
            secureops-sandbox \
            secureops-daemon \
            secureops-napi \
            secureops-cli; do
            while true; do
              if out=$(cargo publish -p "$crate" --no-verify 2>&1); then
                echo "published $crate"; sleep 12; break
              fi
              if echo "$out" | grep -qiE 'already uploaded|crate version.*already|is already'; then
                echo "skip $crate (already published)"; break
              fi
              if echo "$out" | grep -qiE '429|Too Many Requests'; then
                echo "rate limited on $crate — sleeping 11m"; sleep 660; continue
              fi
              echo "$out"; exit 1
            done
          done
