name: CI

on:
  push:
    branches: [master]
    tags: ['v*']        # tag pushes must trigger CI so the tag-gated publish-crates job runs
  pull_request:
    branches: [master]

# Run bundled JS actions (checkout/setup-node) on Node 24, ahead of the Node 20
# removal from runners (Sept 2026). Silences deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust workspace
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v6
        with:
          node-version: 22   # needed by napi-build
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all --check

  # ── Web SPA: build + unit (vitest) + E2E (playwright) ───────────────────
  web:
    name: Web (vitest + playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: CI=1 npm run e2e

  # ── Landing page: static HTML, no build - validate markup (deploy in pages.yml) ──
  site:
    name: Landing page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate HTML
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq tidy
          # tidy exits 1 on warnings, 2 on errors; fail only on errors.
          tidy -q -e site/index.html || [ $? -lt 2 ]

  # ── Postgres integration: runs the `#[ignore]`-gated PgStore tests ──────
  postgres-integration:
    name: Postgres integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: secureops
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/secureops
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p secureops-api -- --ignored --test-threads=1

  # ── Linux eBPF feature build: real kernel-backed objects ────────────────
  ebpf-build:
    name: eBPF feature build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install kernel headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends linux-headers-$(uname -r) libelf-dev
      - run: cargo build -p secureops-bpf --features ebpf
        # eBPF backend is best-effort under hosted runners (no privileged BPF).
        # Compilation success is the gate; runtime loading is exercised by
        # `just bpf-load` on a Linux test host.
        continue-on-error: true

  # ── Cosign: sign + verify release images keylessly via sigstore ─────────
  cosign:
    name: Cosign keyless sign+verify
    needs: [rust]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -f deploy/docker/Dockerfile -t ghcr.io/${{ github.repository_owner }}/secureops:${{ github.ref_name }} .
      - name: Push
        run: docker push ghcr.io/${{ github.repository_owner }}/secureops:${{ github.ref_name }}
      - name: Sign keyless
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/secureops:${{ github.ref_name }}
      - name: Verify
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign verify ghcr.io/${{ github.repository_owner }}/secureops:${{ github.ref_name }} \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

  # ── Release: publish crates.io on version tag ───────────────────────────
  # The npm shim (@aryasoni98/secureops) lives in a separate repository and is
  # released from there; this workspace publishes only the Rust crates.
  publish-crates:
    name: Publish crates.io
    needs: [rust]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2
      # Publish in dependency order (core first, leaf binaries last).
      # Idempotent + rate-limit-aware: skips crates/versions already on
      # crates.io and sleeps through 429s. crates.io throttles *new* crate
      # names to ~1 / 10 min, so a first-time 23-crate publish can take ~4h;
      # the loop simply waits it out (well within the 6h job limit). Re-runs
      # resume cleanly because already-published crates are skipped.
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in \
            secureops-core \
            secureops-tokenbudget \
            secureops-graph \
            secureops-rl \
            secureops-intel \
            secureops-crypto \
            secureops-fs \
            secureops-selfheal \
            secureops-bughunt \
            secureops-checks \
            secureops-harden \
            secureops-monitors \
            secureops-auditlog \
            secureops-ipc \
            secureops-policy \
            secureops-proxy \
            secureops-bpf \
            secureops-sandbox \
            secureops-api \
            secureops-license-server \
            secureops-daemon \
            secureops-napi \
            secureops-cli; do
            while true; do
              if out=$(cargo publish -p "$crate" --no-verify 2>&1); then
                echo "published $crate"; sleep 12; break
              fi
              if echo "$out" | grep -qiE 'already uploaded|crate version.*already|is already'; then
                echo "skip $crate (already published)"; break
              fi
              if echo "$out" | grep -qiE '429|Too Many Requests'; then
                echo "rate limited on $crate - sleeping 11m"; sleep 660; continue
              fi
              echo "$out"; exit 1
            done
          done
