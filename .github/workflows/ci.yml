name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust workspace
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # needed by napi-build
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo build --workspace
        working-directory: rust
      - run: cargo test --workspace
        working-directory: rust
      - run: cargo clippy --workspace -- -D warnings
        working-directory: rust
      - run: cargo fmt --all --check
        working-directory: rust

  ts-build:
    name: TypeScript shim build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: secureops/package-lock.json
      - run: npm ci
        working-directory: secureops
      - run: npm run build
        working-directory: secureops

  # ── Release: publish npm + crates.io on version tag ─────────────────────
  publish-npm:
    name: Publish npm package
    needs: [rust, ts-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
        working-directory: secureops
      - run: npm run build
        working-directory: secureops
      - run: npm publish --provenance --access public
        working-directory: secureops
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    name: Publish crates.io
    needs: [rust, ts-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # Publish in dependency order (core first, cli last).
      - name: Publish crates
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in \
            secureops-core \
            secureops-intel \
            secureops-crypto \
            secureops-fs \
            secureops-checks \
            secureops-harden \
            secureops-monitors \
            secureops-auditlog \
            secureops-ipc \
            secureops-policy \
            secureops-proxy \
            secureops-bpf \
            secureops-sandbox \
            secureops-napi \
            secureops-cli; do
            cargo publish -p "$crate" --no-verify
            sleep 10   # crates.io rate limit
          done
