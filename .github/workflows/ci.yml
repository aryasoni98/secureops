name: CI

on:
  push:
    branches: [master]
    tags: ['v*']        # tag pushes must trigger CI so the tag-gated publish-crates job runs
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust workspace
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # needed by napi-build
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all --check

  # ── Release: publish crates.io on version tag ───────────────────────────
  # The npm shim (@adversa/secureops) lives in a separate repository and is
  # released from there; this workspace publishes only the Rust crates.
  publish-crates:
    name: Publish crates.io
    needs: [rust]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2
      # Publish in dependency order (core first, cli last).
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in \
            secureops-core \
            secureops-intel \
            secureops-crypto \
            secureops-fs \
            secureops-checks \
            secureops-harden \
            secureops-monitors \
            secureops-auditlog \
            secureops-ipc \
            secureops-policy \
            secureops-proxy \
            secureops-bpf \
            secureops-sandbox \
            secureops-daemon \
            secureops-napi \
            secureops-cli; do
            cargo publish -p "$crate" --no-verify
            sleep 10   # crates.io rate limit
          done
