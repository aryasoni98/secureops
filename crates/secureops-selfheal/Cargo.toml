[package]
name = "secureops-selfheal"
description = "SecureOps self-healing playbook engine (PRODUCT.md Â§19/Phase 7): YAML playbooks classified safe/reversible/destructive, snapshotâ†’executeâ†’healthâ†’rollback, HITL approval for destructive, per-class circuit breaker. All cloud calls behind a CloudBackend trait (mock-injectable)."
version.workspace = true
edition.workspace = true
rust-version = "1.82"
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"            # pure-Rust YAML (unsafe-libyaml port; no C/cc)
async-trait = { workspace = true }
anyhow = { workspace = true }
# Real AWS backend (gated). aws-sdk v1 pulls aws-lc-rs (cc>=1.1) - usable now
# that the tree-sitter bump lifted the cc cap. Off by default (heavy).
aws-config = { version = "1", optional = true }
aws-sdk-s3 = { version = "1", optional = true }
aws-sdk-cloudtrail = { version = "1", optional = true }

[features]
aws = ["dep:aws-config", "dep:aws-sdk-s3", "dep:aws-sdk-cloudtrail"]

[dev-dependencies]
tokio = { workspace = true }
