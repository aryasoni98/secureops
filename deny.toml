# cargo-deny config (PRODUCT.md Phase 9 supply-chain hardening).
# Run: cargo install cargo-deny && cargo deny check

[advisories]
version = 2
# Fail on RustSec advisories; warn on yanked crates.
yanked = "warn"
# Error on unmaintained advisories only for direct workspace deps; transitives
# (backoff/instant/paste via neo4rs, rustls-pemfile via neo4rs+rustls-native-certs)
# have no safe upgrade until upstreams migrate and are tracked in DEFERRED.md.
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
# Permissive licenses only - no copyleft beyond MPL/weak-copyleft.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
    "MIT-0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

# ring ships a license file (OpenSSL/ISC derivative) without a `license`
# expression in its manifest; the text scores below our confidence threshold,
# so clarify it explicitly (standard cargo-deny practice for ring).
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Surface accidental duplicate major versions; deny known-bad crates.
multiple-versions = "warn"
wildcards = "warn"
deny = []
# The intentional sqlite pin (see crates/secureops-monitors/Cargo.toml) keeps
# libsqlite3-sys at 0.30.0 to stay under tree-sitter-javascript's cc <1.1 cap.
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
