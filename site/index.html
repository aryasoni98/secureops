  <!-- Framer Motion UMD (exposes window.Motion in v11) -->
  <script src="https://unpkg.com/framer-motion@11.18.2/dist/framer-motion.js"></script>
  <script>
    // The framer-motion UMD dev build renders an internal unkeyed child array for
    // motion components with motion-values in style, tripping React's "unique key"
    // dev warning (component stack always bottoms out in framer's bundle). Filter
    // exactly that known third-party warning — everything else passes through.
    (function () {
      var origError = console.error;
      console.error = function () {
        var joined = Array.prototype.map.call(arguments, String).join(" ");
        if (joined.indexOf('unique "key" prop') !== -1 && joined.indexOf("framer-motion") !== -1) return;
        return origError.apply(console, arguments);
      };
    })();
  </script>
  <script>
    window.FramerMotion = window.Motion || window.FramerMotion || {};
    // Rect-based useInView replacement: IntersectionObserver doesn't fire in some
    // embedded/offscreen contexts, which would leave every Reveal at opacity 0.
    (function () {
      function safeUseInView(ref, opts) {
        opts = opts || {};
        const state = React.useState(false);
        const inView = state[0], setInView = state[1];
        React.useEffect(function () {
          const el = ref.current;
          if (!el) return;
          let fired = false;
          // Scroll events (and rAF/IO) are not dispatched in some embedded
          // contexts — poll as a cheap, always-working fallback.
          const poll = setInterval(check, 400);
          function cleanup() {
            window.removeEventListener("scroll", check);
            window.removeEventListener("resize", check);
            clearInterval(poll);
          }
          function check() {
            if (fired && opts.once) return;
            const r = el.getBoundingClientRect();
            const vh = window.innerHeight || document.documentElement.clientHeight;
            const vis = r.top < vh * 0.92 && r.bottom > vh * 0.06;
            if (vis) {
              setInView(true);
              fired = true;
              if (opts.once) cleanup();
            } else if (!opts.once) {
              setInView(false);
            }
          }
          check();
          window.addEventListener("scroll", check, { passive: true });
          window.addEventListener("resize", check);
          return cleanup;
        }, []);
        return inView;
      }
      window.FramerMotion = Object.assign({}, window.FramerMotion, { useInView: safeUseInView });
    })();
  </script>

  <script>
    // Watchdog: some embedded contexts never run the "update the rendering"
    // loop step — no rAF, no scroll events, and WAAPI/CSS transitions stay
    // frozen at their start values. Detect that once with a probe animation;
    // if frozen, force entrance reveals to their end state (so-frozen class)
    // and periodically finish stuck finite animations. No-op in normal tabs.
    (function () {
      function engage() {
        document.documentElement.classList.add("so-frozen");
        setInterval(function () {
          var anims = document.getAnimations ? document.getAnimations() : [];
          for (var j = 0; j < anims.length; j++) {
            try {
              var ef = anims[j].effect && anims[j].effect.getTiming ? anims[j].effect.getTiming() : null;
              if (ef && ef.iterations !== Infinity) anims[j].finish();
            } catch (e) { /* infinite or irreversible animation — skip */ }
          }
          var els = document.querySelectorAll('[style*="opacity"]');
          for (var i = 0; i < els.length; i++) {
            if (els[i].style.opacity === "0") els[i].style.opacity = "1";
          }
        }, 600);
      }
      function probe() {
        try {
          var p = document.createElement("div");
          p.style.cssText = "position:absolute;width:1px;height:1px;opacity:0;pointer-events:none";
          document.body.appendChild(p);
          var a = p.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 80, fill: "forwards" });
          setTimeout(function () {
            var stalled = !a.currentTime || a.currentTime < 40;
            p.remove();
            if (stalled) engage();
          }, 400);
        } catch (e) { /* no WAAPI — nothing to fix */ }
      }
      if (document.body) probe();
      else document.addEventListener("DOMContentLoaded", probe);
    })();
  </script>
