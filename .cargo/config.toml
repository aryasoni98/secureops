# Cargo workspace configuration for SecureOps.

[build]
# The eBPF programs require a separate build with bpf-linker.
# Build them via: ./scripts/build-ebpf.sh
# Do NOT add bpfel-unknown-none to the default build targets.

[target.x86_64-unknown-linux-gnu]
# Linker for cross-compilation — used by the release workflow.
# linker = "x86_64-linux-gnu-gcc"

[target.aarch64-unknown-linux-gnu]
# Cross-compilation via cross (installed in release workflow).
# linker = "aarch64-linux-gnu-gcc"
