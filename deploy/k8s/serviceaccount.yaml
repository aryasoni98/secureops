# Dedicated ServiceAccount for the host-local workloads. The default SA is
# avoided (CIS 5.1.5/5.1.6) and token automounting is disabled - these pods make
# no Kubernetes API calls, so they should not carry a mounted API credential
# that an attacker could use for lateral movement after a pod compromise.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secureops
  labels:
    app.kubernetes.io/name: secureops
automountServiceAccountToken: false
