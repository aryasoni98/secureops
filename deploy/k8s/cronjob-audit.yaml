apiVersion: batch/v1
kind: CronJob
metadata:
  name: secureops-audit
  labels:
    app.kubernetes.io/name: secureops-audit
    app.kubernetes.io/component: cli-audit
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: secureops-audit
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
          containers:
            - name: audit
              image: secureops-rust:latest
              imagePullPolicy: IfNotPresent
              command: ["secureops", "audit", "--json"]
              env:
                - name: OPENCLAW_STATE_DIR
                  value: /data/openclaw
              volumeMounts:
                - name: state
                  mountPath: /data/openclaw
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "2"
                  memory: 1Gi
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: openclaw-state
