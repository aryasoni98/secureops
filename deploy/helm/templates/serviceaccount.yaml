# Dedicated ServiceAccount for the API. The API makes no Kubernetes API calls,
# so its SA token is not automounted (CIS 5.1.5/5.1.6) - a compromised API pod
# cannot reuse a mounted cluster credential for lateral movement.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "secureops.fullname" . }}
  labels:
    {{- include "secureops.labels" . | nindent 4 }}
automountServiceAccountToken: false
