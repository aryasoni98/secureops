apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "secureops.fullname" . }}
  labels:
    {{- include "secureops.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "secureops.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "secureops.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["secureops-api"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: SECUREOPS_API_ADDR
              value: {{ .Values.api.addr | quote }}
            - name: DATABASE_URL
              value: {{ .Values.api.databaseUrl | quote }}
            - name: REDIS_URL
              value: {{ .Values.api.redisUrl | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.api.otelEndpoint | quote }}
            # JWT secret + license pubkey from a Secret named per values.api.jwtSecretName
            # (keys: jwt-secret, license-pubkey). Create it out-of-band or via your secrets operator.
            - name: SECUREOPS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.jwtSecretName }}
                  key: jwt-secret
                  optional: true
            - name: SECUREOPS_LICENSE_PUBKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.jwtSecretName }}
                  key: license-pubkey
                  optional: true
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
