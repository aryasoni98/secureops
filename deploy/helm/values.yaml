# SecureOps platform (Phase 5) - umbrella values.

replicaCount: 2

image:
  repository: secureops-rust
  # Defaults to the chart appVersion; override for a specific build. Prefer a
  # digest (repository@sha256:...) over a mutable tag in production.
  tag: ""
  pullPolicy: IfNotPresent

api:
  port: 8080
  addr: "0.0.0.0:8080"
  # All API secrets are sourced from a Kubernetes Secret (never inlined here).
  # Required keys in `jwtSecretName`: jwt-secret, license-pubkey, database-url.
  # Optional: api-key-pepper. Create the Secret out-of-band or via your secrets
  # operator (ExternalSecrets / Sealed Secrets / Vault):
  #   kubectl create secret generic secureops-api \
  #     --from-literal=jwt-secret="$(openssl rand -hex 32)" \
  #     --from-literal=license-pubkey="<base64url-ed25519-pubkey>" \
  #     --from-literal=database-url="postgres://user:pass@postgres:5432/secureops" \
  #     --from-literal=api-key-pepper="$(openssl rand -hex 32)"
  jwtSecretName: secureops-api
  # Optional separate Secret for the DB URL (defaults to jwtSecretName).
  secretName: ""
  redisUrl: "redis://redis:6379"
  otelEndpoint: "http://otel-collector:4317"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Restricted Pod Security Standard.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Keep the API available during node drains / rolling upgrades.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

networkPolicy:
  enabled: true
  # CIDR/namespace selectors that may reach the API (default: same namespace).
  ingressFromSameNamespace: true

# Kernel-PEP DaemonSet subchart (charts/bpf-agent). Enterprise tier only.
bpf-agent:
  enabled: false

# Graph backend subchart (charts/neo4j). Pro/Enterprise; Community uses pg-CTE.
neo4j:
  enabled: false
