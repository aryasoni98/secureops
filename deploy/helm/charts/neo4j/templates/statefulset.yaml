{{- if .Values.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-neo4j
  labels:
    app.kubernetes.io/name: secureops-neo4j
    app.kubernetes.io/part-of: secureops
spec:
  serviceName: {{ .Release.Name }}-neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secureops-neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secureops-neo4j
        app.kubernetes.io/part-of: secureops
    spec:
      containers:
        - name: neo4j
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NEO4J_AUTH
              value: "{{ .Values.auth.username }}/{{ .Values.auth.password }}"
          ports:
            - name: bolt
              containerPort: {{ .Values.ports.bolt }}
            - name: http
              containerPort: {{ .Values.ports.http }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: bolt
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
{{- end }}
